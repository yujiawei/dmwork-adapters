name: 🐛 Bug 报告
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 Bug！请尽量填写完整信息，帮助我们快速定位问题。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要描述遇到的问题
      placeholder: Bot 连接 WebSocket 后频繁断线重连
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序列出复现步骤
      placeholder: |
        1. 配置 dmwork channel plugin
        2. openclaw gateway restart
        3. 观察日志：WebSocket 每 30 秒断连
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: WebSocket 保持稳定连接
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: 每 30 秒断连并重连，日志中有 ECONNRESET 错误
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 适配器版本
      placeholder: "0.2.17"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: 影响组件
      options:
        - OpenClaw Channel Plugin
        - Claude Code Adapter
        - 其他
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - P0 - 服务不可用 / 数据丢失
        - P1 - 核心功能异常
        - P2 - 非核心功能异常
        - P3 - 体验问题
    validations:
      required: true
  - type: checkboxes
    id: reproducible
    attributes:
      label: 可复现性
      options:
        - label: 可稳定复现
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: OS、Node.js 版本、OpenClaw 版本、DMWork 服务端版本等
      placeholder: |
        - OS: macOS 15.3
        - Node.js: 22.x
        - OpenClaw: 2026.3.1
        - DMWork Server: v1.1.1
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 相关日志、错误信息或截图（敏感信息请脱敏）
    validations:
      required: false
