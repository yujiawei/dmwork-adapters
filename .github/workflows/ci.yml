name: ✅ CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-channel-dmwork

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: openclaw-channel-dmwork/package-lock.json

      - name: 📦 Install
        run: npm ci

      - name: 🔍 Debug
        run: |
          node --version
          npx tsc --version
          wc -l src/inbound.test.ts
          cat node_modules/openclaw/package.json | grep version | head -1
          ls node_modules/openclaw/dist/plugin-sdk/channels/plugins/ | head -10

      - name: 🔍 Type Check
        run: npx tsc --noEmit

      - name: 🧪 Test
        run: npm test

      - name: 🏗️ Build
        run: npm run build
