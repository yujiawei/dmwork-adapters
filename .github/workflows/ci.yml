name: ✅ CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-channel-dmwork

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: openclaw-channel-dmwork/package-lock.json

      - name: 📦 Install
        run: npm ci

      - name: 🔍 Type Check
        run: npx tsc --noEmit

      - name: 🧪 Test
        run: npm test

      - name: 🏗️ Build
        run: npm run build
